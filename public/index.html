<!DOCTYPE html>
<html>
    <head>
        <title>WITIME PACKAGES</title>
        <style>
            body {
                font-family: Arial;
                background: #1dbfe7d0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            h2{
                color: white;
                margin-bottom: 20px;
            }
            
            .container {
                width: 300px;
                text-align: center;
            }

            .packages {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            
            .packages button {
                background: #00c3ff;
                padding: 15px;
                border: none;
                cursor: pointer;
                color: white;
                font-size: 16px;
                border-radius: 10px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
                font-weight: bold;
                transition: 0.3s;
            }
            
            .package button:hover {
                background: #0056b3;
                transform: scale(1.03) ;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Witime Packages</h2>
            
            <div class="packages">
            <button type="button" onclick="selectPackage('1 hour')">1 Hour - KES 5</button>
            <button type="button" onclick="selectPackage('2 hours')">2 Hours - KES 15</button>
            <button type="button" onclick="selectPackage('3 hours')">3 Hours - KES 25</button>
            <button type="button" onclick="selectPackage('6 hours')">6 Hours - KES 50</button>
            <button type="button" onclick="selectPackage('12 hours')">12 Hours - KES 80</button>
            </div>
        </div>
        
        <script>
            function selectPackage(pkg){
                alert("CLICKED: " + pkg);
                window.location.href = "pay.html?package=" + encodeURIComponent(pkg);
            }

        </script>
    </body>
</html>
