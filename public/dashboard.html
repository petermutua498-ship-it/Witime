<!DOCTYPE html>
<html>
    <head>
        <title>Admin Dashboard</title>

        <style>
            body {
                font-family: Arial;
                padding: 20px;
                background: #f5f5f5;
            }

            table {
                width: 100%;
                background: white;
                border-collapse: collapse;
            }

            th, td {
                padding: 10px;
                border: 1px solid #ccc;
                text-align: center;
            }

            th {
                background: #333;
                color: white;
            }

            button {
                margin-bottom: 15px;
                padding: 10px;
            }

        </style>
    </head>

    <body>
        <h2>Admin Dashboard</h2>

        <button onclick="loadData()">Refresh</button>
        <button onclick="logout()">Logout</button>
        
        <table>
            <thead>
                <tr>
                    <th>Phone</th>
                    <th>Code</th>
                    <th>Status</th>
                    <th>Expiry</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

    <script>
        if (localStorage.getItem("admin") !== "true") {
            window.location.href = "/admin-login.html";
        }

        async function load() {
            const res = await fetch("/admin-data");
            const data = await res.json();

            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
        
            data.forEach(item => {
                const row = `
                <tr>
                    <td>${item.phone}</td>
                    <td>${item.code}</td>
                    <td>${item.active ? "Active" : "Used"}</td>
                    <td>${new Date(item.expiresAt).toLocaleString()}</td>
                </tr>
                `;
                tbody.innerHTML += row;
            });
        }
        
        function logout() {
            localStorage.removeItem("admin");
            window.location.href = "/admin-login.html";
        }

        async function disconnect(phone) {
            await fetch("/disconnect", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ phone })
            });

            loadData();
        }
    </script>

    </body>
</html>
