<!DOCTYPE html>
<html>
    <body>
        <h2>Enter Code</h2>

        <input type="text" id="codeInput" placeholder="Enter code">
        <button id="verifyBtn">Connect</button>
        <p id="result"></p>

        <script>
            const verifyBtn = document.getElementById("verifyBtn");

            if (!verifyBtn) {
                console.error("Button not found");
            } else {
                
                verifyBtn.addEventListener("click", () => {

                const enteredCode = document.getElementById("codeInput").value;
                const savedCode = localStorage.getItem("wificode");

                console.log("Entered:", enteredCode);
                console.log("Saved:", savedCode);

                if (!enteredCode) {
                    alert("Enter code");
                    return;
                }

                if (enteredCode === savedCode) {
                    result.innerText = "Connected";
                } else {
                    result.innerText = "Invalid code";
                }
            });

            }

        

        </script>
    </body>
</html>
