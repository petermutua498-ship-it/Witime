<!DOCTYPE html>
<html>
    <head>
        <title>Pay</title>

        <style>
            body {
                font-family: Arial;
                background: #00bcd4;
                padding-top: 50px;
                text-align: center;
            }

            .box {
                background: white;
                padding: 20px;
                border-radius: 10px;
                display:inline-block;
            }

            input, button {
                width: 200px;
                padding: 10px;
                margin-top: 10px;
            }

            #codeBox {
                margin-top: 15px;
                display: none;
            }

            button {
                background: #2196f3;
                color: white;
                border: none;
                cursor: pointer;
            }
        </style>
    </head>
<body>
    <div class="box">
        <h3> Enter Phone</h3>

        <input type="text" id="phone" placeholder="2547xxxxxxxx" autocomplete="tel" required>

        <button onclick="pay()">Pay</button>

        <p id="msg"></p>

        <div id="codeBox">
            <h4>Your Code</h4>
            <p id="code"></p>
            <p id="timer"></p>
        </div>
    </div>

    <script>
         async function pay() {
            let phone = document.getElementById("phone").value;

            phone = phone.replace(/\D/g, "");

            if (phone.startsWith("0")) {
                phone = "254" + phone.substring(1);
            } else if (phone.startsWith("254")) {
                //ok
            } else if (phone.startsWith("7")) {
                phone = "254" + phone;
            }

            console.log("PHONE SENT:", phone);

            if (phone.length !== 12 || !phone.startsWith("2547")) {
                alert("Enter valid MPESA number");
                return;
            }

            document.getElementById("result").innerText = "Waiting for Payment confirmation...";
            
            const res = await fetch("/pay", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ phone })
            });

            const data = await res.json();
            console.log("PAY RESPONSE:", data);

            const interval = setInterval(async () => {
                const res = await fetch(`/check-payment/${phone}`);
                
                const data = await res.json();
                
                if (data.status === "success") {
                    document.getElementById("result").innerText = "Your code is: " + data.code;

                    clearInterval(interval);
                }
            }, 5000);             
        }
    </script>

</body>

</html>
